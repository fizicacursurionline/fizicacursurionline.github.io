<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>FIZICA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }

    /* TITLU */
    header {
      background: #1e88e5;
      color: white;
      padding: 25px 10px;
      text-align: center;
      font-size: 2.5em;
      font-weight: bold;
      letter-spacing: 2px;
    }

    /* MENIU ORIZONTAL */
    nav {
      background: #1565c0;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 15px 0;
      position: relative;
    }

    nav > a, nav .dropdown > a {
      color: white;
      text-decoration: none;
      font-size: 1.2em;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ffeb3b;
    }

    /* DROPDOWN */
    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background: #1976d2;
      min-width: 200px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      z-index: 10;
      border-radius: 5px;
      top: 100%;   /* LIPIT de buton – nu mai dispare */
      left: 0;
    }

    .dropdown-content a {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      font-size: 1em;
    }

    .dropdown-content a:hover {
      background: #0d47a1;
    }
