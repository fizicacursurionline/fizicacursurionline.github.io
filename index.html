<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>FIZICA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
    }

    /* TITLU */
    header {
      background: #1e88e5;
      color: white;
      padding: 25px 10px;
      text-align: center;
      font-size: 2.5em;
      font-weight: bold;
      letter-spacing: 2px;
    }

    /* MENIU ORIZONTAL */
    nav {
      background: #1565c0;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 15px 0;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 1.2em;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ffeb3b;
    }

    /* CONȚINUT */
    .content {
      max-width: 900px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <!-- TITLU -->
  <header>FIZICA</header>

  <!-- MENIU -->
  <nav>
    <a href="#">Clasa VI</a>
    <a href="#">Clasa VII</a>
    <a href="#">Clasa VIII</a>
  </nav>

  <!-- CONȚINUT -->
  <div class="content">
    <h2>Bine ai venit!</h2>
    <p>Aici poți adăuga lecții, experimente, fișe de lucru sau proiecte pentru clasele VI, VII și VIII.</p>
  </div>

</body>
</html>
